services:
  - type: web
    name: youtube-automation
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node server.tsx
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/prod.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1